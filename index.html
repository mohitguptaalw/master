<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meridian Park Bulk Order Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-align: left;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 {
            font-size: 1.4rem;
            margin-bottom: 5px;
        }
        .tabs {
            display: flex;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 76px;
            z-index: 99;
        }
        .tab {
            flex: 1;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
            padding: 20px 15px;
            text-align: left;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
            text-align: left;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: white;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
.btn-secondary {
            background: #e0e0e0;
            color: #333;
            margin-top: 10px;
        }
        .appliance-card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 1px solid #e8e8e8;
        }
        .appliance-card .header-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
        }
        .appliance-card .checkbox-item {
            width: 22px;
            height: 22px;
            margin: 0;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }
        .appliance-card .appliance-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .appliance-card .appliance-icon {
            font-size: 1.3rem;
        }
        .appliance-card .appliance-name {
            font-weight: 600;
            font-size: 1rem;
        }
        .appliance-card .detail-row {
            display: none;
            gap: 10px;
            margin-top: 14px;
            padding-left: 34px;
        }
        .appliance-card .detail-row input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        #toast {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Meridian Park Bulk Order Form</h1>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('entry')">New Order</div>
        <div class="tab" onclick="switchTab('report')">View Report</div>
    </div>

    <div id="entry" class="tab-content active">
        <form id="orderForm">
            <div class="form-group">
                <label>Customer Name *</label>
                <input type="text" id="name" required placeholder="Enter full name">
            </div>

            <div class="form-group">
                <label>Flat Number *</label>
                <input type="text" id="flatNumber" required>
            </div>

            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="tel" id="mobile" required placeholder="Enter 10-digit mobile number" pattern="[0-9]{10}">
            </div>

            <div class="form-group">
                <label>Tentative Procurement Date</label>
                <input type="date" id="procurementDate">
            </div>

            <div class="form-group">
                <label>Select Appliances *</label>
                <div id="applianceCards"></div>
            </div>

            <div class="selection-summary">
                <span class="count" id="selectionCount">0</span>
                <span class="text"> items selected</span>
            </div>

            <button type="submit" class="btn btn-primary">Submit Order</button>
            <button type="reset" class="btn btn-secondary">Clear Form</button>
        </form>
    </div>

    <div id="report" class="tab-content">
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="exportToExcel()">Export Excel</button>
        </div>
        <div id="ordersList"></div>
    </div>

    <div id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbybL0H8OEiJhby5AlZoR9dV8ZXUa_2iviQr4mPGlws8Pg9I7TS6KdUag9bp7nhyqEKFhA/exec';
        
        const appliances = [
            { name: 'Windows Grill', icon: '🪟' },
            { name: 'Windows Mesh', icon: '🔲' },
            { name: 'Bathroom Glass Separator', icon: '🚿' },
            { name: 'Electronic & Kitchen Appliances', icon: '🔌' },
            { name: 'Water RO', icon: '💧' },
            { name: 'Furniture', icon: '🛋️' },
            { name: 'Electric Lights', icon: '💡' },
            { name: 'Third Party Site Inspection', icon: '🔍' },
            { name: 'Tiles & Counter Top', icon: '🏠' }
        ];

        function loadOrders() {
            const orders = localStorage.getItem('meridianOrders');
            return orders ? JSON.parse(orders) : [];
        }

        function saveOrders(orders) {
            localStorage.setItem('meridianOrders', JSON.stringify(orders));
        }

        function updateSummary() {
            const checked = document.querySelectorAll('.appliance-card input[type="checkbox"]:checked');
            document.getElementById('selectionCount').textContent = checked.length;
        }

        function initAppliances() {
            const container = document.getElementById('applianceCards');
            appliances.forEach((app, index) => {
                const div = document.createElement('div');
                div.className = 'appliance-card';
                const safeId = app.name.replace(/\s+/g, '') + index;
                div.innerHTML = `
                    <div class="header-row">
                        <input type="checkbox" value="${app.name}" id="${safeId}" class="checkbox-item">
                        <label for="${safeId}" class="appliance-label">
                            <span class="appliance-icon">${app.icon}</span>
                            <span class="appliance-name">${app.name}</span>
                        </label>
                    </div>
                    <div class="detail-row" style="display: none;">
                        <input type="number" placeholder="Qty" min="1" value="1" class="qty-input">
                        <input type="text" placeholder="Brand / Model / Details" class="brand-input">
                    </div>
                `;
                const checkbox = div.querySelector('input[type="checkbox"]');
                const detailRow = div.querySelector('.detail-row');
                checkbox.addEventListener('change', () => {
                    detailRow.style.display = checkbox.checked ? 'flex' : 'none';
                    updateSummary();
                });
                container.appendChild(div);
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            if (tabName === 'report') {
                document.getElementById('ordersList').innerHTML = '';
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function getSelectedAppliances() {
            const cards = document.querySelectorAll('.appliance-card');
            const selected = [];
            cards.forEach(card => {
                const checkbox = card.querySelector('input[type="checkbox"]');
                if (checkbox.checked) {
                    const qty = card.querySelector('.qty-input').value || 1;
                    const brand = card.querySelector('.brand-input').value || 'Not specified';
                    selected.push({
                        name: checkbox.value,
                        qty: qty,
                        brand: brand
                    });
                }
            });
            return selected;
        }

        document.getElementById('orderForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const selectedAppliances = getSelectedAppliances();
            if (selectedAppliances.length === 0) {
                alert('Please select at least one appliance');
                return;
            }

            const now = new Date();
            const orderData = {
                id: Date.now(),
                name: document.getElementById('name').value,
                flatNumber: document.getElementById('flatNumber').value,
                mobile: document.getElementById('mobile').value,
                procurementDate: document.getElementById('procurementDate').value || 'Not specified',
                appliances: selectedAppliances,
                date: now.toLocaleDateString(),
                time: now.toLocaleTimeString()
            };

            const orders = loadOrders();
            orders.push(orderData);
            saveOrders(orders);

            fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                body: JSON.stringify(orderData),
                redirect: 'follow'
            }).catch(() => {});

            showToast('Order saved successfully!');
            document.getElementById('orderForm').reset();
            document.querySelectorAll('.appliance-card').forEach(card => {
                card.querySelector('input[type="checkbox"]').checked = false;
                card.querySelector('.detail-row').classList.remove('show');
                card.querySelector('.qty-input').value = 1;
                card.querySelector('.brand-input').value = '';
            });
            updateSummary();
        });

        function displayOrders(orders) {
            const container = document.getElementById('ordersList');
            if (!orders || orders.length === 0) {
                container.innerHTML = `
                    <p style="text-align: center; color: #888; padding: 40px;">No orders found. Add a new order and it will appear here.</p>
                `;
                return;
            }

            container.innerHTML = orders.reverse().map(order => `
                <div class="order-card">
                    <div class="header-row">
                        <span class="name">${order.Name || order.name}</span>
                        <span class="date">${order.Date || ''} ${order.Time || ''}</span>
                    </div>
                    <div class="detail"><span class="detail-label">Flat:</span> ${order['Flat Number'] || order.flatNumber}</div>
                    <div class="detail"><span class="detail-label">Mobile:</span> ${order.Mobile || order.mobile}</div>
                    <div class="detail"><span class="detail-label">Procurement:</span> ${order['Procurement Date'] || order.procurementDate || 'N/A'}</div>
                    <div class="appliances-list">
                        <span class="appliance-tag">${order.Appliance} (${order.Qty || 1}) - ${order.Brand || 'N/A'}</span>
                    </div>
                </div>
            `).join('');
        }

        function loadOrdersFromSheet() {
            return fetch(GOOGLE_SHEET_URL, { redirect: 'follow' })
                .then(res => res.json())
                .catch(() => []);
        }

        function clearAllOrders() {
            if (confirm('Are you sure you want to delete all orders? This cannot be undone.')) {
                localStorage.removeItem('meridianOrders');
                displayOrders([]);
                showToast('All orders cleared!');
            }
        }

        function exportToExcel() {
            document.getElementById('selectionCount').textContent = 'Loading...';
            
            fetch(GOOGLE_SHEET_URL, { redirect: 'follow' })
                .then(res => res.json())
                .then(orders => {
                    if (!orders || orders.length === 0) {
                        alert('No orders found');
                        document.getElementById('selectionCount').textContent = '0';
                        return;
                    }

                    const wb = XLSX.utils.book_new();

                    const allOrdersData = [['Date', 'Time', 'Name', 'Flat Number', 'Mobile', 'Procurement Date', 'Appliance', 'Qty', 'Brand']];
                    const applianceSheets = {};
                    
                    appliances.forEach(app => {
                        applianceSheets[app.name] = [['Date', 'Time', 'Name', 'Flat Number', 'Mobile', 'Procurement Date', 'Qty', 'Brand']];
                    });

                    orders.forEach(order => {
                        if (order.Appliance) {
                            allOrdersData.push([
                                order.Date || '',
                                order.Time || '',
                                order.Name || '',
                                order['Flat Number'] || '',
                                order.Mobile || '',
                                order['Procurement Date'] || '',
                                order.Appliance || '',
                                order.Qty || '',
                                order.Brand || ''
                            ]);

                            if (applianceSheets[order.Appliance]) {
                                applianceSheets[order.Appliance].push([
                                    order.Date || '',
                                    order.Time || '',
                                    order.Name || '',
                                    order['Flat Number'] || '',
                                    order.Mobile || '',
                                    order['Procurement Date'] || '',
                                    order.Qty || '',
                                    order.Brand || ''
                                ]);
                            }
                        }
                    });

                    const allOrdersSheet = XLSX.utils.aoa_to_sheet(allOrdersData);
                    XLSX.utils.book_append_sheet(wb, allOrdersSheet, 'All Orders');

                    appliances.forEach(app => {
                        if (applianceSheets[app.name].length > 1) {
                            const sheet = XLSX.utils.aoa_to_sheet(applianceSheets[app.name]);
                            const sheetName = app.name.length > 30 ? app.name.substring(0, 30) : app.name;
                            XLSX.utils.book_append_sheet(wb, sheet, sheetName);
                        }
                    });

                    const fileName = 'Meridian_Orders_' + new Date().toISOString().split('T')[0] + '.xlsx';
                    XLSX.writeFile(wb, fileName);
                    updateSummary();
                })
                .catch((err) => {
                    console.error(err);
                    alert('Error loading orders from Google Sheet. Please check if the sheet is accessible.');
                    updateSummary();
                });
        }

        initAppliances();
    </script>
</body>
</html>
